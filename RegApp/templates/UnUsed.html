<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unused Things Registration</title>
    {% load static %}
    <link rel="shortcut icon" href="{% static 'images/TLOGO2.png' %}">
    <style>
        body {
            background-color: lightseagreen;
            font-family: "";
        }
        fieldset {
            background-color: lightyellow;
            width: 70%;
            margin-left: 15%;
            margin-top: 2%;
            text-align: center;
            border-radius: 8%;
        }
        legend {
            text-align: left;
        }
        h2 {
            text-decoration-line: underline;
            font-family: 'Alberta';
        }
        table {
            text-align: left;
        }
        input {
            border-radius: 5px;
            height: 15pt;
            padding-left: 4pt;
        }
        input[type='submit'], input[type='reset'] {
            width: 20%;
            height: unset;
            background-color: darkred;
            color: white;
            font-family: 'Cambria';
            font-size: 12pt;
            padding: 4px;
        }
        select {
            border-radius: 5px;
            height: 15pt;
            width: 98%;
        }
        textarea {
            border-radius: 5px;
            padding: 4pt;
        }
        a {
            margin: 10px;
        }
    </style>
    <script>
        var x = "{{ msg }}";
        if (x != "" && x != "pp") {
            alert(x);
        }
    </script>
</head>
<body>
    <a href="/">Back</a>
    <form method="post">{% csrf_token %}
        <fieldset style="border: none">
            <h2>Unused Things Registration</h2>
            <hr>
            <span>
                <select name="CmbBox" style="width: 15%; height: 20%; padding: 4px">
                    <option>-Select-</option>
                    {% for foo in record1 %}
                        <option value="{{ foo.0 }}">Serial -{{ foo.0 }}</option>
                    {% endfor %}
                </select>
                <input type="submit" id="sub" style="width: 8%; padding: 3px" formaction="{% url 'UnusedSearch1' %}">
            </span>
            <fieldset>
                <legend>Product Details</legend>
                <table>
                    <tr>
                        <td>Serial No.</td>
                        <td>:</td>
                        <td><input type="text" name="Slno" value="{{ record.0 }}"></td>
                        <td>Product ID</td>
                        <td>:</td>
                        <td><input type="text" name="Proid" value="{{ record.1 }}"></td>
                    </tr>
                    <tr>
                        <td>Product Name</td>
                        <td>:</td>
                        <td><input type="text" name="ProName" value="{{ record.2 }}"></td>
                        <td>Category</td>
                        <td>:</td>
                        <td>
                            <select name="ProCate">
                                <option value="">-Select-</option>
                                <option value="Electronics" {% if record.3 == 'Electronics' %}selected{% endif %}>Electronics</option>
                                <option value="Clothing" {% if record.3 == 'Clothing' %}selected{% endif %}>Clothing</option>
                                <option value="Furniture" {% if record.3 == 'Furniture' %}selected{% endif %}>Furniture</option>
                                <option value="Books" {% if record.3 == 'Books' %}selected{% endif %}>Books</option>
                                <option value="Other" {% if record.3 == 'Other' %}selected{% endif %}>Other</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>Sub-Category</td>
                        <td>:</td>
                        <td><input type="text" name="ProSubCate" value="{{ record.4 }}"></td>
                        <td>Serial Number</td>
                        <td>:</td>
                        <td><input type="text" name="ProSerial" value="{{ record.5 }}"></td>
                    </tr>
                </table>
            </fieldset>
            <fieldset>
                <legend>Stock Details</legend>
                <table>
                    <tr>
                        <td>Batch Number</td>
                        <td>:</td>
                        <td><input type="text" name="ProBatchno" value="{{ record.6 }}"></td>
                        <td>Purchase Date</td>
                        <td>:</td>
                        <td><input type="date" name="PurchDate" value="{{ record.7 }}"></td>
                    </tr>
                    <tr>
                        <td>Status</td>
                        <td>:</td>
                        <td>
                            <select name="Status">
                                <option value="">-Select-</option>
                                <option value="Available" {% if record.8 == 'Available' %}selected{% endif %}>Available</option>
                                <option value="Donated" {% if record.8 == 'Donated' %}selected{% endif %}>Donated</option>
                                <option value="Distributed" {% if record.8 == 'Distributed' %}selected{% endif %}>Distributed</option>
                            </select>
                        </td>
                        <td>Remarks</td>
                        <td>:</td>
                        <td><textarea name="Remarks" id="" cols="30" rows="3" maxlength="200">{{ record.9 }}</textarea></td>
                    </tr>
                </table>
            </fieldset>
            <div style="margin-left: 50%; margin-top: 2%">
                <input type="submit" value="Save" formaction="{% url 'UnusedSave1' %}">
                <input type="reset" value="Reset">
                <input type="submit" value="Delete" formaction="{% url 'UnusedDelete1' %}">
                <input type="submit" value="Update" formaction="{% url 'UnusedUpdate1' %}">
            </div>
        </fieldset>
    </form>
</body>
</html>
