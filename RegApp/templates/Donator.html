<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donator Registration</title>
    {% load static %}
    <link rel="shortcut icon" href="{% static 'images/TLOGO2.png' %}">
    <link rel="stylesheet" href="{% static 'images/style.css' %}">

</head>
<body class="teal-bg">
    <!-- Announcement Bar -->
    <div class="announcement-bar">
        Welcome! For Queries, Contact No: +91 7992241733
    </div>

    <!-- Main Navigation Header & Banners -->
    {% include 'navbar.html' %}

    <div class="card-container large-card">
        <fieldset>
            <h2>Donator Registration</h2>
            {% if msg and msg != "pp" and msg != "None" and msg != "" %}
                <div class="alert-banner {% if 'Successfully' in msg or 'Saved' in msg or 'Updated' in msg %}success{% else %}error{% endif %}">
                    {{ msg }}
                </div>
            {% endif %}
            <hr>
            
            <!-- Search Section -->
            <form method="post" action="{% url 'DonatorSearch1' %}" class="search-form">
                {% csrf_token %}
                <span class="search-container">
                    <select name="CmbBox" class="form-control select-search">
                        <option value="">-Select Serial-</option>
                        {% for foo in record1 %}
                            <option value="{{ foo.0 }}">{{ foo.2 }} (ID: {{ foo.1 }})</option>
                        {% endfor %}
                    </select>
                    <input type="submit" value="Search" class="btn btn-search">
                </span>
            </form>
            
            <!-- Main Registration Form -->
            <form method="post">
                {% csrf_token %}
                
                <h3 class="section-title">Account Details</h3>
                <div class="form-grid">
                    <div class="form-field">
                        <label>Serial No.</label>
                        <input type="text" name="Slno" value="{{ record.0|default:'' }}" required class="form-control">
                    </div>
                    <div class="form-field">
                        <label>Donator Name</label>
                        <input type="text" name="Dname" value="{{ record.2|default:'' }}" required maxlength="100" class="form-control">
                    </div>
                    <div class="form-field">
                        <label>Donor/User Id</label>
                        <input type="text" name="Donorid" value="{{ record.1|default:'' }}" required maxlength="50" class="form-control">
                    </div>
                    <div class="form-field">
                        <label>Password</label>
                        <input type="password" name="Dpsd" value="{{ record.3|default:'' }}" required minlength="6" class="form-control">
                    </div>
                    <div class="form-field">
                        <label>Confirm Password</label>
                        <input type="password" name="Dcpsd" value="{{ record.4|default:'' }}" required minlength="6" class="form-control">
                    </div>
                </div>
                
                <h3 class="section-title" style="margin-top: 25px;">Personal Details</h3>
                <div class="form-grid">
                    <div class="form-field">
                        <label>Date of Birth</label>
                        <input type="date" name="Dob" value="{{ record.5|default:'' }}" class="form-control">
                    </div>
                    <div class="form-field">
                        <label>Gender</label>
                        <select name="Gen" class="form-control">
                            <option value="">-Select-</option>
                            <option value="Male" {% if record.6 == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if record.6 == 'Female' %}selected{% endif %}>Female</option>
                            <option value="Transgender" {% if record.6 == 'Transgender' %}selected{% endif %}>Transgender</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label>Mobile No.</label>
                        <input type="tel" name="Dmob" maxlength="10" pattern="[0-9]{10}" title="Enter a valid 10-digit mobile number" value="{{ record.7|default:'' }}" required class="form-control">
                    </div>
                    <div class="form-field">
                        <label>Email-Id</label>
                        <input type="email" name="Demail" value="{{ record.8|default:'' }}" required maxlength="100" class="form-control">
                    </div>
                </div>
                
                <h3 class="section-title" style="margin-top: 25px;">Address Details</h3>
                <div class="form-grid">
                    <div class="form-field">
                        <label>Address Line 1</label>
                        <input type="text" name="Add1" value="{{ record.9|default:'' }}" class="form-control">
                    </div>
                    <div class="form-field">
                        <label>Address Line 2</label>
                        <input type="text" name="Add2" value="{{ record.10|default:'' }}" class="form-control">
                    </div>
                    <div class="form-field">
                        <label>State</label>
                        <select name="State" class="form-control">
                            <option value="">-Select-</option>
                            <option value="Bihar" {% if record.11 == 'Bihar' %}selected{% endif %}>Bihar</option>
                            <option value="Maharastra" {% if record.11 == 'Maharastra' %}selected{% endif %}>Maharastra</option>
                            <option value="WestBangal" {% if record.11 == 'WestBangal' %}selected{% endif %}>Westbangal</option>
                            <option value="Jharkhand" {% if record.11 == 'Jharkhand' %}selected{% endif %}>Jharkhand</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label>City</label>
                        <select name="City" class="form-control">
                            <option value="">-Select-</option>
                            <option value="Patna" {% if record.12 == 'Patna' %}selected{% endif %}>Patna</option>
                            <option value="Ranchi" {% if record.12 == 'Ranchi' %}selected{% endif %}>Ranchi</option>
                            <option value="Mumbai" {% if record.12 == 'Mumbai' %}selected{% endif %}>Mumbai</option>
                            <option value="Kolkata" {% if record.12 == 'Kolkata' %}selected{% endif %}>Kolkata</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label>Pin Code</label>
                        <input type="text" name="Pin" maxlength="6" pattern="[0-9]{6}" title="Enter a valid 6-digit pin code" value="{{ record.13|default:'' }}" class="form-control">
                    </div>
                    <div class="form-field full-width">
                        <label>Remarks</label>
                        <textarea name="Remarks" rows="3" class="form-control">{{ record.14|default:'' }}</textarea>
                    </div>
                </div>
                
                <div class="btn-group">
                    <input type="submit" value="Save" formaction="{% url 'DonatorSave1' %}" class="btn btn-primary">
                    <input type="reset" value="Reset" class="btn btn-reset">
                    <input type="submit" value="Delete" formaction="{% url 'DonatorDelete1' %}" class="btn btn-delete">
                    <input type="submit" value="Update" formaction="{% url 'DonatorUpdate1' %}" class="btn btn-update">
                </div>
            </form>
        </fieldset>
    </div>
</body>
</html>
