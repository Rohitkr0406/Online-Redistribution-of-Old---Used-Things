<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribution Details - Share & Care</title>
    {% load static %}
    <link rel="shortcut icon" href="{% static 'images/TLOGO2.png' %}">
    <link rel="stylesheet" href="{% static 'css/admin_dashboard.css' %}">
</head>
<body>
    <!-- Sidebar Navigation -->
    {% include 'AdminMenu.html' %}

    <!-- Main Content Area -->
    <div class="main-content">
        <div class="header-banner">
            <div>
                <h1>Distribution Details</h1>
                <p style="color: var(--text-muted); margin: 4px 0 0 0;">Track item distributions and beneficiary details.</p>
            </div>
        </div>

        {% if msg and msg != "pp" and msg != "None" and msg != "" %}
            <div class="alert {% if 'Successfully' in msg or 'Saved' in msg or 'Updated' in msg %}alert-success{% else %}alert-error{% endif %}">
                {{ msg }}
            </div>
        {% endif %}

        <!-- Search Section -->
        <div class="form-box" style="margin-bottom: 32px;">
            <h3 style="margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px;">Search Distribution Record</h3>
            <form method="post" action="{% url 'DistributionSearch1' %}">
                {% csrf_token %}
                <div class="search-container" style="margin-bottom: 0;">
                    <select name="CmbBox" class="form-control" style="flex-grow: 1;">
                        <option value="">-Select Serial-</option>
                        {% for foo in record1 %}
                            <option value="{{ foo.0 }}">Prod: {{ foo.1 }} to {{ foo.2 }}</option>
                        {% endfor %}
                    </select>
                    <button type="submit" class="btn-primary">Search</button>
                </div>
            </form>
        </div>

        <!-- Details Form -->
        <div class="form-box">
            <h3 style="margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px;">Record Distribution Details</h3>
            <form method="post">
                {% csrf_token %}
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 28px;">
                    <div class="form-group">
                        <label>Serial No.</label>
                        <input type="text" name="Slno" value="{{ record.0|default:'' }}" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Product Id</label>
                        <select name="Proid" class="form-control">
                            <option value="">-Select-</option>
                            {% for val1 in val %}
                                {% for v1 in val1 %}
                                    <option value="{{ v1 }}" {% if record.1 == v1 %}selected{% endif %}>{{ v1 }}</option>
                                {% endfor %}
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Distribution Quantity</label>
                        <input type="text" name="DisQty" value="{{ record.2|default:'' }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Distribution Date</label>
                        <input type="date" name="DisDate" value="{{ record.3|default:'' }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Distribution By</label>
                        <select name="DisBy" class="form-control">
                            <option value="">-Select-</option>
                            <option value="Vol1" {% if record.4 == "Vol1" %}selected{% endif %}>Volunteer 1</option>
                            <option value="Vol2" {% if record.4 == "Vol2" %}selected{% endif %}>Volunteer 2</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Receiver Name</label>
                        <input type="text" name="RecName" value="{{ record.5|default:'' }}" class="form-control">
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Receiver Address</label>
                        <textarea name="RecAdd" rows="2" class="form-control">{{ record.6|default:'' }}</textarea>
                    </div>
                    <div class="form-group">
                        <label>Receiver Mobile No.</label>
                        <input type="text" name="RecMob" value="{{ record.7|default:'' }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Received By</label>
                        <input type="text" name="RecBy" value="{{ record.8|default:'' }}" class="form-control">
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Remarks</label>
                        <textarea name="Remarks" rows="2" class="form-control">{{ record.9|default:'' }}</textarea>
                    </div>
                </div>

                <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                    <button type="submit" formaction="{% url 'DistributionSave1' %}" class="btn-primary">Save</button>
                    <button type="reset" class="btn-primary" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-main);">Reset</button>
                    <button type="submit" formaction="{% url 'DistributionDelete1' %}" class="btn-primary" style="background: linear-gradient(135deg, var(--accent-rose), #e11d48);">Delete</button>
                    <button type="submit" formaction="{% url 'DistributionUpdate1' %}" class="btn-primary" style="background: linear-gradient(135deg, var(--accent-cyan), var(--accent-indigo));">Update</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
