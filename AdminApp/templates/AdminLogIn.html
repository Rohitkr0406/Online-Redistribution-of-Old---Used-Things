<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator Login - Share & Care</title>
    {% load static %}
    <link rel="shortcut icon" href="{% static 'images/TLOGO2.png' %}">
    <link rel="stylesheet" href="{% static 'css/admin_dashboard.css' %}">
    <style>
        body {
            justify-content: center;
            align-items: center;
            background-color: var(--bg-primary);
        }
        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        .login-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .login-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .login-header img {
            height: 60px;
            width: auto;
        }
        .login-header h1 {
            font-size: 1.75rem;
            margin: 0;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .login-header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.9rem;
        }
        .switch-link {
            text-align: center;
            margin-top: 10px;
            font-size: 0.875rem;
        }
        .switch-link a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 600;
        }
        .switch-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="{% static 'images/TLOGO2.png' %}" alt="Logo">
                <h1>Admin Control Panel</h1>
                <p>Please enter your administrator credentials</p>
            </div>
            
            {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li class="alert alert-{% if message.tags == 'error' %}error{% else %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </li>
                {% endfor %}
            </ul>
            {% endif %}

            <form method="post" action="{% url 'admin_login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="admin / email" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 12px; padding: 14px;">Sign In</button>
            </form>
            
            <div class="switch-link">
                <a href="/FirstApp/Login">Switch to Donor Portal</a>
            </div>
        </div>
    </div>
</body>
</html>
