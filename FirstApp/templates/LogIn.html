<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogIn / SignUp</title>
    {% load static %}
    <link rel="shortcut icon" href="{% static 'images/TLOGO2.png' %}">
    <link rel="stylesheet" href="{% static 'images/style.css' %}">
    <style>
        .login-card {
            margin-top: 60px;
            max-width: 420px;
        }
    </style>
</head>
<body class="teal-bg">
    <!-- Announcement Bar -->
    <div class="announcement-bar">
        Welcome! For Queries, Contact No: +91 7992241733
    </div>

    <!-- Main Navigation Header & Banners -->
    {% include 'navbar.html' with skip_global_messages=True %}

    <div class="card-container login-card">
        <form method="post" action="/FirstApp/Login">
            {% csrf_token %}
            <fieldset>
                <h2>LogIn / SignUp</h2>
                <hr>
                
                {% if messages %}
                <div style="margin-bottom: 15px;">
                    {% for message in messages %}
                    <div style="padding: 10px 15px; border-radius: 6px; margin-bottom: 10px; font-size: 0.9rem; font-weight: 600; 
                                {% if message.tags == 'error' or 'unauthorized' in message.text|lower %}background-color: rgba(244,63,94,0.15); color: #f43f5e; border: 1px solid #f43f5e;
                                {% else %}background-color: rgba(13,148,136,0.15); color: #0d9488; border: 1px solid #0d9488;{% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <div class="form-group">
                    <label>User Type</label>
                    <div style="display: flex; gap: 20px; margin-bottom: 15px; margin-top: 5px;">
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; color: #475569;">
                            <input type="radio" name="user_type" value="donor" checked style="width: auto; height: auto;"> Donor
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; color: #475569;">
                            <input type="radio" name="user_type" value="admin" style="width: auto; height: auto;"> Admin
                        </label>
                    </div>

                    <label>User ID / Email</label>
                    <input type="text" placeholder="Enter User Id or Email" required name="userid" class="form-control">
                    
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" placeholder="Enter Password" required name="password" class="form-control">
                        <button type="button" class="password-toggle-btn" aria-label="Toggle Password Visibility">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-slash-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    
                    <input type="submit" value="Login" class="btn btn-primary" style="width: 100%; margin-top: 15px;">
                    
                    <div style="margin-top: 15px; text-align: center;">
                        <a href="/RegApp/Donator" class="form-link">Create Account?</a>
                        <br>
                        <a href="#" class="form-link">Forget Password?</a>
                    </div>
                </div>
            </fieldset>
        </form>
    </div>
    
    <script>
        document.querySelectorAll('.password-toggle-btn').forEach(button => {
            button.addEventListener('click', function() {
                const wrapper = this.closest('.password-wrapper');
                const input = wrapper.querySelector('input');
                const eyeIcon = this.querySelector('.eye-icon');
                const eyeSlashIcon = this.querySelector('.eye-slash-icon');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    eyeIcon.style.display = 'none';
                    eyeSlashIcon.style.display = 'block';
                } else {
                    input.type = 'password';
                    eyeIcon.style.display = 'block';
                    eyeSlashIcon.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
