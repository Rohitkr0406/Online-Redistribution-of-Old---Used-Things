<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogIn / SignUp</title>
    {% load static %}
    <link rel="shortcut icon" href="{% static 'images/TLOGO2.png' %}">
    <link rel="stylesheet" href="{% static 'images/style.css' %}">
    <style>
        .login-card {
            margin-top: 60px;
            max-width: 420px;
        }
    </style>
</head>
<body class="teal-bg">
    <!-- Announcement Bar -->
    <div class="announcement-bar">
        Welcome! For Queries, Contact No: +91 7992241733
    </div>

    <!-- Main Navigation Header & Banners -->
    {% include 'navbar.html' %}

    <div class="card-container login-card">
        <form method="post" action="/FirstApp/Login">
            {% csrf_token %}
            <fieldset>
                <h2>LogIn / SignUp</h2>
                <hr>
                
                {% if messages %}
                <div style="margin-bottom: 15px;">
                    {% for message in messages %}
                    <div style="padding: 10px 15px; border-radius: 6px; margin-bottom: 10px; font-size: 0.9rem; font-weight: 600; 
                                {% if message.tags == 'error' or 'unauthorized' in message.text|lower %}background-color: rgba(244,63,94,0.15); color: #f43f5e; border: 1px solid #f43f5e;
                                {% else %}background-color: rgba(13,148,136,0.15); color: #0d9488; border: 1px solid #0d9488;{% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <div class="form-group">
                    <label>User Type</label>
                    <div style="display: flex; gap: 20px; margin-bottom: 15px; margin-top: 5px;">
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; color: #475569;">
                            <input type="radio" name="user_type" value="donor" checked style="width: auto; height: auto;"> Donor
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; color: #475569;">
                            <input type="radio" name="user_type" value="admin" style="width: auto; height: auto;"> Admin
                        </label>
                    </div>

                    <label>User ID / Email</label>
                    <input type="text" placeholder="Enter User Id or Email" required name="userid" class="form-control">
                    
                    <label>Password</label>
                    <input type="password" placeholder="Enter Password" required name="password" class="form-control">
                    
                    <input type="submit" value="Login" class="btn btn-primary" style="width: 100%; margin-top: 15px;">
                    
                    <div style="margin-top: 15px; text-align: center;">
                        <a href="/RegApp/Donator" class="form-link">Create Account?</a>
                        <br>
                        <a href="#" class="form-link">Forget Password?</a>
                    </div>
                </div>
            </fieldset>
        </form>
    </div>
</body>
</html>
