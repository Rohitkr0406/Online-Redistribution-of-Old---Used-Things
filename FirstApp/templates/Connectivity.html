<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connectivity Status</title>
    {% load static %}
    <link rel="shortcut icon" href="{% static 'images/TLOGO2.png' %}">
    <link rel="stylesheet" href="{% static 'images/style.css' %}">
    <style>
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body class="teal-bg">
    <!-- Announcement Bar -->
    <div class="announcement-bar">
        Welcome! For Queries, Contact No: +91 7992241733
    </div>

    <!-- Main Navigation Header & Banners -->
    {% include 'navbar.html' %}

    <div class="card-container">
        <fieldset>
            <h2>Database Connection Status</h2>
            <hr>
            <div class="{% if 'Successfully' in msg %}success{% else %}error{% endif %}">
                {{ msg }}
            </div>
        </fieldset>
    </div>
</body>
</html>
